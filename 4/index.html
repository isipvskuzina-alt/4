<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор заметок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1> Редактор заметок</h1>
        
        <!-- Форма -->
        <div class="form">
            <input type="text" id="titleInput" placeholder="Заголовок">
            <textarea id="textInput" placeholder="Текст заметки..." rows="4"></textarea>
            <button id="saveBtn"> Сохранить</button>
            <button id="cancelBtn" style="display:none;"> Отмена</button>
        </div>

        <!-- Список заметок -->
        <div class="notes">
            <h2>Мои заметки (<span id="notesCount">0</span>)</h2>
            <div id="notesContainer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
